apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/version: "16"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1  # PostgreSQL is typically deployed as a single instance
  strategy:
    type: Recreate  # Ensure only one instance runs at a time
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/version: "16"
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: stream-sniper
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999  # postgres user
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - exec pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - exec pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # PostgreSQL needs to write to various locations
          capabilities:
            drop:
            - ALL
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: postgres-init
        configMap:
          name: postgres-init-scripts
          defaultMode: 0755
      restartPolicy: Always

---
# ConfigMap for PostgreSQL initialization scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/version: "16"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
data:
  01-init-db.sql: |
    -- Initialize Stream Sniper database schema
    
    -- Create schema if it doesn't exist
    CREATE SCHEMA IF NOT EXISTS stream_sniper;
    
    -- Set default schema
    SET search_path TO stream_sniper, public;
    
    -- Create tables (this will be replaced with actual schema from create_table.sql)
    -- For now, we'll create basic tables to ensure the database starts correctly
    
    CREATE TABLE IF NOT EXISTS creator (
        id SERIAL PRIMARY KEY,
        nick VARCHAR(255) UNIQUE NOT NULL,
        display_name VARCHAR(255),
        profile_image_url TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    CREATE TABLE IF NOT EXISTS stream (
        id SERIAL PRIMARY KEY,
        twitch_id VARCHAR(255) UNIQUE NOT NULL,
        title TEXT,
        start_time TIMESTAMP,
        end_time TIMESTAMP,
        message_count INTEGER DEFAULT 0,
        creator_id INTEGER REFERENCES creator(id),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    CREATE TABLE IF NOT EXISTS chatter (
        id SERIAL PRIMARY KEY,
        nick VARCHAR(255) UNIQUE NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    CREATE TABLE IF NOT EXISTS message_text (
        id SERIAL PRIMARY KEY,
        text TEXT UNIQUE NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    CREATE TABLE IF NOT EXISTS message (
        id SERIAL PRIMARY KEY,
        chatter_id INTEGER REFERENCES chatter(id),
        stream_id INTEGER REFERENCES stream(id),
        message_text_id INTEGER REFERENCES message_text(id),
        timestamp TIMESTAMP NOT NULL,
        tagged_chatter_id INTEGER REFERENCES chatter(id),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Create indexes for better performance
    CREATE INDEX IF NOT EXISTS idx_stream_creator_id ON stream(creator_id);
    CREATE INDEX IF NOT EXISTS idx_stream_twitch_id ON stream(twitch_id);
    CREATE INDEX IF NOT EXISTS idx_message_stream_id ON message(stream_id);
    CREATE INDEX IF NOT EXISTS idx_message_chatter_id ON message(chatter_id);
    CREATE INDEX IF NOT EXISTS idx_message_timestamp ON message(timestamp);
    CREATE INDEX IF NOT EXISTS idx_creator_nick ON creator(nick);
    CREATE INDEX IF NOT EXISTS idx_chatter_nick ON chatter(nick);
    
    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA stream_sniper TO current_user;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA stream_sniper TO current_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA stream_sniper TO current_user;