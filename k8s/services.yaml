# Service Account for API pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stream-sniper-api
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
automountServiceAccountToken: true

---
# Service Account for Collector pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stream-sniper-collector
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper-collector
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
automountServiceAccountToken: true

---
# RBAC ClusterRole for monitoring access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stream-sniper-monitoring
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]

---
# RBAC ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stream-sniper-monitoring
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
subjects:
- kind: ServiceAccount
  name: stream-sniper-api
  namespace: stream-sniper
roleRef:
  kind: ClusterRole
  name: stream-sniper-monitoring
  apiGroup: rbac.authorization.k8s.io

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/version: "16"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/version: "7"
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache

---
# Stream Sniper API Service
apiVersion: v1
kind: Service
metadata:
  name: stream-sniper-api-service
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5002
    protocol: TCP
    name: http
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/component: api

---
# Stream Sniper API Service - LoadBalancer (for external access)
apiVersion: v1
kind: Service
metadata:
  name: stream-sniper-api-external
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5002
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/component: api
  # Optional: Configure load balancer specific settings
  # loadBalancerSourceRanges:
  # - 0.0.0.0/0  # Allow all IPs - restrict as needed

---
# Headless service for StatefulSet-like behavior (if needed)
apiVersion: v1
kind: Service
metadata:
  name: stream-sniper-api-headless
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 5002
    targetPort: 5002
    protocol: TCP
    name: http
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/component: api