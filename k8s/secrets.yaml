    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
type: Opaque
data:
  # Monitoring and alerting credentials (base64 encoded)
  PROMETHEUS_TOKEN: cHJvbWV0aGV1c190b2tlbg==  # prometheus_token
  GRAFANA_API_KEY: Z3JhZmFuYV9hcGlfa2V5  # grafana_api_key