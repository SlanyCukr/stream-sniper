# Secret for TLS certificates (if using custom certificates)
apiVersion: v1
kind: Secret
metadata:
  name: stream-sniper-tls
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
type: kubernetes.io/tls
data:
  # Replace with actual certificate and key (base64 encoded)
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t  # base64 encoded certificate
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t  # base64 encoded private key

