    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
type: Opaque
data:
  # Database credentials (base64 encoded - replace with actual values)
  POSTGRES_USER: c3RyZWFtX3NuaXBlcg==  # stream_sniper
  POSTGRES_PASSWORD: Y2hhbmdlX21lX3BsZWFzZQ==  # change_me_please
  
  # Redis credentials (base64 encoded - replace with actual values)
  REDIS_PASSWORD: cmVkaXNfc2VjdXJlX3Bhc3N3b3Jk  # redis_secure_password
  
  # Twitch API credentials (base64 encoded - replace with actual values)
  TWITCH_CLIENT_ID: eW91cl90d2l0Y2hfY2xpZW50X2lk  # your_twitch_client_id
  TWITCH_CLIENT_SECRET: eW91cl90d2l0Y2hfY2xpZW50X3NlY3JldA==  # your_twitch_client_secret
  TWITCH_ACCESS_TOKEN: eW91cl90d2l0Y2hfYWNjZXNzX3Rva2Vu  # your_twitch_access_token
  
  # Database connection URL (base64 encoded)
  DATABASE_URL: cG9zdGdyZXNxbDovL3N0cmVhbV9zbmlwZXI6Y2hhbmdlX21lX3BsZWFzZUBwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIvc3RyZWFtX3NuaXBlcg==
  
