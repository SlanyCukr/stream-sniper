apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""  # Use default storage class or specify your preferred storage class
  resources:
    requests:
      storage: 20Gi  # Adjust based on expected data volume
  # Optional: storage class specific configurations
  # storageClassName: fast-ssd

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""  # Use default storage class or specify your preferred storage class
  resources:
    requests:
      storage: 5Gi  # Redis typically needs less storage
  # Optional: storage class specific configurations
  # storageClassName: fast-ssd

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stream-sniper-logs-pvc
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  accessModes:
    - ReadWriteMany  # Multiple pods may need to write logs
  storageClassName: ""  # Use default storage class or specify your preferred storage class
  resources:
    requests:
      storage: 10Gi  # Storage for application logs
  # Optional: storage class specific configurations
  # storageClassName: standard