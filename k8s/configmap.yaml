apiVersion: v1
kind: ConfigMap
metadata:
  name: stream-sniper-config
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: configuration
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
data:
  # Application Configuration
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: "INFO"
  API_PORT: "5002"
  API_HOST: "0.0.0.0"
  
  # Database Configuration (non-sensitive)
  POSTGRES_DB: "stream_sniper"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  
  # Redis Configuration (non-sensitive)
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Rate Limiting Configuration
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  
  # Cache Configuration
  CACHE_ENABLED: "true"
  CACHE_TTL: "300"
  CACHE_MAX_SIZE: "1000"
  
  # Health Check Configuration
  HEALTH_CHECK_TIMEOUT: "30"
  HEALTH_CHECK_INTERVAL: "10"
  
  # API Configuration
  API_CORS_ENABLED: "true"
  API_CORS_ORIGINS: "*"
  API_REQUEST_TIMEOUT: "30"
  
  # Twitch API Configuration (non-sensitive)
  TWITCH_API_BASE_URL: "https://api.twitch.tv/helix"
  TWITCH_API_TIMEOUT: "10"
  
  # Database Pool Configuration
  DB_POOL_MIN_SIZE: "5"
  DB_POOL_MAX_SIZE: "20"
  DB_POOL_TIMEOUT: "30"
  
  # Monitoring Configuration
  METRICS_ENABLED: "true"
  PROMETHEUS_PORT: "8080"
  
  # Application Metadata
  APP_VERSION: "2.0.0"
  APP_NAME: "stream-sniper"
  APP_ENVIRONMENT: "production"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stream-sniper-scripts
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: scripts
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
data:
  # Health check script
  health-check.sh: |
    #!/bin/bash
    set -e
    
    # Check if API is responding
    response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5002/health || echo "000")
    
    if [ "$response" = "200" ]; then
        echo "Health check passed"
        exit 0
    else
        echo "Health check failed with status: $response"
        exit 1
    fi
  
  # Readiness check script
  readiness-check.sh: |
    #!/bin/bash
    set -e
    
    # Check if API is ready to serve requests
    response=$(curl -s -f http://localhost:5002/health/ready || echo "failed")
    
    if [ "$response" != "failed" ]; then
        echo "Readiness check passed"
        exit 0
    else
        echo "Readiness check failed"
        exit 1
    fi
  
  # Database migration script
  db-migrate.sh: |
    #!/bin/bash
    set -e
    
    echo "Running database migrations..."
    
    # Wait for database to be ready
    until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
        echo "Waiting for database..."
        sleep 2
    done
    
    # Run database schema creation
    if [ -f "/app/stream_sniper/database/create_table.sql" ]; then
        psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB -f /app/stream_sniper/database/create_table.sql
        echo "Database migrations completed"
    else
        echo "No migration files found"
    fi