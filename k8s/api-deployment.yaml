apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-sniper-api
  namespace: stream-sniper
  labels:
    app.kubernetes.io/name: stream-sniper-api
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: stream-sniper
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 3  # Start with 3 replicas for high availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-sniper-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-sniper-api
        app.kubernetes.io/version: "2.0.0"
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: stream-sniper
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      serviceAccountName: stream-sniper-api  # Will be created in services.yaml
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U $POSTGRES_USER; do
            echo "Waiting for database..."
            sleep 2
          done
          echo "Database is ready!"
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: POSTGRES_USER
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      - name: wait-for-redis
        image: redis:7-alpine
        command:
        - sh
        - -c
        - |
          until redis-cli -h redis-service -p 6379 -a $REDIS_PASSWORD ping; do
            echo "Waiting for Redis..."
            sleep 2
          done
          echo "Redis is ready!"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: REDIS_PASSWORD
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      containers:
      - name: api
        image: stream-sniper:2.0.0  # Replace with your actual image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5002
          name: http
          protocol: TCP
        - containerPort: 8080
          name: metrics
          protocol: TCP
        env:
        # ConfigMap environment variables
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: PYTHONUNBUFFERED
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: LOG_LEVEL
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: API_PORT
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: API_HOST
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: REDIS_PORT
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: REDIS_DB
        - name: CACHE_ENABLED
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: CACHE_ENABLED
        - name: RATE_LIMIT_ENABLED
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: RATE_LIMIT_ENABLED
        - name: METRICS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: METRICS_ENABLED
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: APP_VERSION
        - name: APP_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: stream-sniper-config
              key: APP_ENVIRONMENT
        # Secret environment variables
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: REDIS_PASSWORD
        - name: TWITCH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: TWITCH_CLIENT_ID
        - name: TWITCH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: TWITCH_CLIENT_SECRET
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: stream-sniper-secrets
              key: REDIS_URL
        # Kubernetes-specific environment variables
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBERNETES_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KUBERNETES_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - python
        - -m
        - stream_sniper.api.server
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: scripts
          mountPath: /app/scripts
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Startup probe - allows more time for initial startup
        startupProbe:
          httpGet:
            path: /health
            port: 5002
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
          successThreshold: 1
        # Liveness probe - checks if application is alive
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        # Readiness probe - checks if application is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5002
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - sleep 15  # Allow time for graceful shutdown
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: stream-sniper-logs-pvc
      - name: scripts
        configMap:
          name: stream-sniper-scripts
          defaultMode: 0755
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      # Pod disruption budget friendly configuration
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - stream-sniper-api
              topologyKey: kubernetes.io/hostname