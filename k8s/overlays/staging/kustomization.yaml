apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference to base configuration
resources:
  - ../../

# Override namespace for staging
namespace: stream-sniper-staging

# Staging-specific labels
commonLabels:
  environment: staging
  team: qa

# Staging-specific annotations
commonAnnotations:
  deployment.environment: staging
  config.version: staging

# Staging images
images:
  - name: stream-sniper
    newName: your-registry.com/stream-sniper  # Replace with your registry
    newTag: "staging-latest"

# Staging-specific ConfigMap
configMapGenerator:
  - name: stream-sniper-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
      - ENVIRONMENT=staging
      - API_CORS_ORIGINS=https://staging-api.yourdomain.com,https://staging.yourdomain.com
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS=500
      - CACHE_ENABLED=true
      - CACHE_TTL=300
      - DEBUG=false
      - METRICS_ENABLED=true
    options:
      disableNameSuffixHash: true

# Staging-specific secrets
secretGenerator:
  - name: stream-sniper-secrets
    behavior: merge
    literals:
      # Staging database credentials
      - POSTGRES_USER=c3RhZ2luZ191c2Vy  # staging_user
      - POSTGRES_PASSWORD=c3RhZ2luZ19wYXNzd29yZA==  # staging_password
      - REDIS_PASSWORD=c3RhZ2luZ19yZWRpcw==  # staging_redis
    options:
      disableNameSuffixHash: true

# Staging patches
patchesStrategicMerge:
  - staging-patches.yaml