apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-sniper-api
spec:
  replicas: 2  # Moderate replica count for staging
  template:
    spec:
      containers:
      - name: api
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  template:
    spec:
      containers:
      - name: postgres
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  template:
    spec:
      containers:
      - name: redis
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  resources:
    requests:
      storage: 20Gi  # Moderate storage for staging

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  resources:
    requests:
      storage: 5Gi  # Moderate storage for staging

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stream-sniper-logs-pvc
spec:
  resources:
    requests:
      storage: 10Gi  # Moderate log storage for staging

---
# Moderate HPA settings for staging
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stream-sniper-api-hpa
spec:
  minReplicas: 2
  maxReplicas: 5