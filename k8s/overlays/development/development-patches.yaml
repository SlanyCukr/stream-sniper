apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-sniper-api
spec:
  replicas: 1  # Single replica for development
  template:
    spec:
      containers:
      - name: api
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          periodSeconds: 10  # Faster feedback in development
        readinessProbe:
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  template:
    spec:
      containers:
      - name: postgres
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  template:
    spec:
      containers:
      - name: redis
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  resources:
    requests:
      storage: 5Gi  # Smaller storage for development

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
spec:
  resources:
    requests:
      storage: 1Gi  # Smaller storage for development

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stream-sniper-logs-pvc
spec:
  resources:
    requests:
      storage: 2Gi  # Smaller log storage for development

---
# Disable HPA in development
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stream-sniper-api-hpa
spec:
  minReplicas: 1
  maxReplicas: 2