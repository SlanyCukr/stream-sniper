apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: stream-sniper-base
  annotations:
    config.kubernetes.io/local-config: "true"

# Namespace for all resources
namespace: stream-sniper

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: stream-sniper
  app.kubernetes.io/version: "2.0.0"
  app.kubernetes.io/managed-by: kustomize

# Common annotations applied to all resources
commonAnnotations:
  config.kubernetes.io/origin: |
    configuredIn: kustomization.yaml
    configuredBy:
      apiVersion: builtin
      kind: kustomization

# Resources to include in the deployment
resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - pvc.yaml
  - postgres-deployment.yaml
  - redis-deployment.yaml
  - api-deployment.yaml
  - collector-deployment.yaml
  - services.yaml
  - ingress.yaml
  - hpa.yaml
  - network-policies.yaml

# Images to replace
images:
  - name: stream-sniper
    newName: stream-sniper
    newTag: "2.0.0"
  - name: postgres
    newName: postgres
    newTag: "16-alpine"
  - name: redis
    newName: redis
    newTag: "7-alpine"

# ConfigMap generators for environment-specific configurations
configMapGenerator:
  - name: stream-sniper-env-config
    literals:
      - ENVIRONMENT=production
      - DEPLOYMENT_TYPE=kubernetes
      - CLUSTER_NAME=production-cluster
    options:
      disableNameSuffixHash: true

# Secret generators for environment-specific secrets
secretGenerator:
  - name: stream-sniper-env-secrets
    literals:
      - DEPLOYMENT_ID=prod-k8s-001
    type: Opaque
    options:
      disableNameSuffixHash: true

# Patches to apply
patchesStrategicMerge:
  - patches/production-resources.yaml

# JSON patches for fine-grained modifications
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: stream-sniper-api
    path: patches/api-production-patch.yaml

# Replacements for dynamic values
replacements:
  - source:
      kind: ConfigMap
      name: stream-sniper-config
      fieldPath: data.APP_VERSION
    targets:
    - select:
        kind: Deployment
        name: stream-sniper-api
      fieldPaths:
      - spec.template.metadata.labels.[app.kubernetes.io/version]
    - select:
        kind: Deployment
        name: postgres
      fieldPaths:
      - spec.template.metadata.labels.[app.kubernetes.io/version]