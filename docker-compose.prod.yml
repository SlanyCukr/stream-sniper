services:
  stream-sniper-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3001:3000"
    environment:
      - API_PROXY_TARGET=http://stream-sniper-api:5002
      - NODE_ENV=production
    restart: unless-stopped
    container_name: stream-sniper-frontend
    networks:
      - stream-sniper-prod
    depends_on:
      - stream-sniper-api

  stream-sniper-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    expose:
      - "5002"
    environment:
      - POSTGRES_HOST=172.17.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stream_sniper
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - CORS_ORIGINS=["*"]
    restart: unless-stopped
    container_name: stream-sniper-api
    networks:
      - stream-sniper-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  stream-sniper-tracking:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    command: ["python", "-m", "stream_sniper.tracking_service"]
    environment:
      - POSTGRES_HOST=172.17.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stream_sniper
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
    restart: unless-stopped
    container_name: stream-sniper-tracking
    networks:
      - stream-sniper-prod
    depends_on:
      - stream-sniper-api


networks:
  stream-sniper-prod:
    driver: bridge