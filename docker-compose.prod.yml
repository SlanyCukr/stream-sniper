services:
  stream-sniper-frontend:
    # image: must match what deploy.yml's `docker build -t` produces, or
    # `up` silently reuses a stale compose-named image instead
    image: stream-sniper-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3001:3000"
    environment:
      - API_PROXY_TARGET=http://stream-sniper-api:5002
      - NODE_ENV=production
    restart: unless-stopped
    container_name: stream-sniper-frontend
    networks:
      - stream-sniper-prod
    depends_on:
      - stream-sniper-api

  stream-sniper-api:
    image: stream-sniper-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    expose:
      - "5002"
    environment:
      - POSTGRES_HOST=172.17.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stream_sniper
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env.prod - refusing to start with a default JWT secret}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - CORS_ORIGINS=["*"]
      # Adding a tracked streamer via the API calls the Twitch API (creator
      # lookup), so the api process needs Twitch creds too — not just tracking.
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
    restart: unless-stopped
    container_name: stream-sniper-api
    networks:
      - stream-sniper-prod
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5002/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3

  stream-sniper-tracking:
    # same image as the API, different command — no separate build
    image: stream-sniper-api:latest
    command: ["python", "-m", "stream_sniper.tracking_service"]
    environment:
      - POSTGRES_HOST=172.17.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stream_sniper
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
    restart: unless-stopped
    container_name: stream-sniper-tracking
    networks:
      - stream-sniper-prod
    depends_on:
      - stream-sniper-api

  stream-sniper-live:
    image: stream-sniper-api:latest
    command: ["python", "-m", "stream_sniper.live_service"]
    environment:
      - POSTGRES_HOST=172.17.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stream_sniper
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - TWITCH_BOT_REFRESH_TOKEN=${TWITCH_BOT_REFRESH_TOKEN}
      - LIVE_CHANNELS=${LIVE_CHANNELS}
      - LIVE_TRACKED_CHANNELS=${LIVE_TRACKED_CHANNELS:-true}
      - LIVE_FLUSH_INTERVAL=${LIVE_FLUSH_INTERVAL:-5}
      - LIVE_BUFFER_SIZE=${LIVE_BUFFER_SIZE:-1000}
      - TWITCH_BOT_TOKEN_FILE=/tokens/refresh-token
    volumes:
      - live_tokens:/tokens
    restart: unless-stopped
    container_name: stream-sniper-live
    networks:
      - stream-sniper-prod
    depends_on:
      - stream-sniper-api


networks:
  stream-sniper-prod:
    driver: bridge

volumes:
  live_tokens:
