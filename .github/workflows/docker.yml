name: Docker Build & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}-api
  IMAGE_NAME_COLLECTOR: ${{ github.repository }}-collector

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: ./backend/Dockerfile.api
            image: api
            context: ./backend
          - dockerfile: ./backend/Dockerfile.collector
            image: collector
            context: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=Stream Sniper ${{ matrix.image }}
          org.opencontainers.image.description=Twitch stream analytics platform - ${{ matrix.image }} component
          org.opencontainers.image.vendor=slanycukr

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Test Docker image
      if: github.event_name != 'pull_request'
      run: |
        # Docker references must be lowercase; github.repository is "SlanyCukr/…"
        image="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}-${{ matrix.image }}:latest"
        if [ "${{ matrix.image }}" = "api" ]; then
          # server entry point starts uvicorn; smoke-test via an import with a
          # dummy JWT secret (the app fail-fasts without one) instead of --help
          docker run --rm -e JWT_SECRET_KEY=ci-test-secret "$image" python -c "import stream_sniper.api.api; print('API image import OK')"
        else
          docker run --rm "$image" --help
        fi

  security-scan:
    name: Security Scan Docker Images
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        image: [api, collector]

    steps:
    - name: Compute lowercase image reference
      id: image
      # Docker references must be lowercase; github.repository is "SlanyCukr/…"
      run: echo "ref=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}-${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.image.outputs.ref }}
        format: 'sarif'
        output: 'trivy-results-${{ matrix.image }}.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results-${{ matrix.image }}.sarif'
        category: 'trivy-${{ matrix.image }}'

  docker-compose-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Create test environment file
      run: |
        cat > .env << EOF
        TWITCH_USERNAME=testuser
        JWT_SECRET_KEY=ci-test-secret
        # DB connection vars read by the app (connection_pool.py)
        POSTGRES_USER=postgres
        POSTGRES_PASSWORD=testpass
        POSTGRES_HOST=postgres
        POSTGRES_DB=stream_sniper
        POSTGRES_PORT=5432
        TEST_DB_HOST=postgres
        TEST_DB_NAME=test_stream_sniper
        TEST_DB_USER=postgres
        TEST_DB_PASSWORD=testpass
        TEST_DB_PORT=5432
        EOF

    - name: Build images with docker compose
      run: |
        docker compose build

    - name: Test API service startup
      run: |
        docker compose up -d api
        sleep 10

        # Test API health
        docker compose exec -T api curl -f http://localhost:5002/health || \
        docker compose exec -T api wget -q --spider http://localhost:5002/health || \
        echo "API health check failed but continuing..."

        docker compose down

    - name: Test collector service
      run: |
        # Test collector help command
        docker compose run --rm collector --help || echo "Collector help test completed"
