name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --locked

    - name: Run ruff (lint)
      run: uv run ruff check .

    - name: Run ruff format check (advisory)
      run: uv run ruff format --check . || true

    - name: Run mypy (type checking, advisory)
      run: uv run mypy stream_sniper/ || true

  test:
    name: Tests (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET_KEY: ci-test-secret

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_stream_sniper
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --locked

    - name: Set up test database
      env:
        TEST_DB_HOST: localhost
        TEST_DB_NAME: test_stream_sniper
        TEST_DB_USER: postgres
        TEST_DB_PASSWORD: postgres
        TEST_DB_PORT: 5432
      run: |
        # Wait for PostgreSQL to be ready
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done

        # Create test database if it doesn't exist
        PGPASSWORD=postgres psql -h localhost -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'test_stream_sniper'" | grep -q 1 || PGPASSWORD=postgres createdb -h localhost -U postgres test_stream_sniper

    - name: Run unit tests
      env:
        TEST_DB_HOST: localhost
        TEST_DB_NAME: test_stream_sniper
        TEST_DB_USER: postgres
        TEST_DB_PASSWORD: postgres
        TEST_DB_PORT: 5432
        REDIS_HOST: localhost
        REDIS_PORT: 6379
      run: |
        uv run pytest tests/unit -v --cov=stream_sniper --cov-report=xml --cov-report=term-missing

    - name: Run integration tests
      env:
        TEST_DB_HOST: localhost
        TEST_DB_NAME: test_stream_sniper
        TEST_DB_USER: postgres
        TEST_DB_PASSWORD: postgres
        TEST_DB_PORT: 5432
        REDIS_HOST: localhost
        REDIS_PORT: 6379
      run: |
        uv run pytest tests/integration -v --cov=stream_sniper --cov-append --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  package-test:
    name: Package Installation Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: [lint, test]
    env:
      JWT_SECRET_KEY: ci-test-secret
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Test package installation
      run: |
        python -m pip install --upgrade pip build
        python -m build
        pip install dist/*.whl

        # Collection CLI supports --help
        stream-sniper --help

    - name: Test import functionality
      run: |
        python -c "import stream_sniper; print('Package import successful')"
        python -c "import stream_sniper.api.api; print('API module import successful')"
        python -c "from stream_sniper.collector import twitch_collector_facade; print('Collector module import successful')"

  docker-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile.api
        push: false
        load: true
        tags: stream-sniper-api:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Collector Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile.collector
        push: false
        load: true
        tags: stream-sniper-collector:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker images
      run: |
        # API image: verify the app imports (server entry point starts uvicorn,
        # so smoke-test via an import with a dummy JWT secret instead of --help)
        docker run --rm -e JWT_SECRET_KEY=ci-test-secret stream-sniper-api:test \
          python -c "import stream_sniper.api.api; print('API image import OK')"

        # Collector image: the CLI supports --help
        docker run --rm stream-sniper-collector:test --help

  security-baseline:
    name: Security Baseline Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Export dependency list for scanning
      run: uv export --format requirements-txt --no-hashes --no-emit-project -o requirements.txt

    - name: Run safety (dependency vulnerability check)
      run: uvx safety check -r requirements.txt --json || true

    - name: Run bandit (security linter)
      run: uvx bandit -r stream_sniper/ -f json || true

    - name: Run semgrep (security patterns)
      run: uvx semgrep --config=auto stream_sniper/ --json || true

  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run typecheck

    - name: Build
      run: npm run build
