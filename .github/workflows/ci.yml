name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: backend/pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Black (code formatting check)
      run: black --check --diff .

    - name: Run isort (import sorting check)
      run: isort --check-only --diff .

    - name: Run flake8 (linting)
      run: flake8 stream_sniper/ tests/ --max-line-length=120 --extend-ignore=E203,W503

    - name: Run mypy (type checking)
      run: mypy stream_sniper/ --ignore-missing-imports

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_stream_sniper
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: backend/pyproject.toml

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Set up test database
      env:
        TEST_DB_HOST: localhost
        TEST_DB_NAME: test_stream_sniper
        TEST_DB_USER: postgres
        TEST_DB_PASSWORD: postgres
        TEST_DB_PORT: 5432
      run: |
        # Wait for PostgreSQL to be ready
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
        
        # Create test database if it doesn't exist
        PGPASSWORD=postgres psql -h localhost -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'test_stream_sniper'" | grep -q 1 || PGPASSWORD=postgres createdb -h localhost -U postgres test_stream_sniper

    - name: Run unit tests
      env:
        TEST_DB_HOST: localhost
        TEST_DB_NAME: test_stream_sniper
        TEST_DB_USER: postgres
        TEST_DB_PASSWORD: postgres
        TEST_DB_PORT: 5432
      run: |
        pytest tests/unit/ -v --cov=stream_sniper --cov-report=xml --cov-report=term-missing

    - name: Run integration tests
      env:
        TEST_DB_HOST: localhost
        TEST_DB_NAME: test_stream_sniper
        TEST_DB_USER: postgres
        TEST_DB_PASSWORD: postgres
        TEST_DB_PORT: 5432
      run: |
        pytest tests/integration/ -v --cov=stream_sniper --cov-append --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  package-test:
    name: Package Installation Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Test package installation
      run: |
        python -m pip install --upgrade pip build
        python -m build
        pip install dist/*.whl
        
        # Test CLI commands are available
        stream-sniper --help
        stream-sniper-api --help

    - name: Test import functionality
      run: |
        python -c "import stream_sniper; print('Package import successful')"
        python -c "from stream_sniper.api import api; print('API module import successful')"
        python -c "from stream_sniper.collector import twitch_collector_facade; print('Collector module import successful')"

  docker-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile.api
        push: false
        tags: stream-sniper-api:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Collector Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile.collector
        push: false
        tags: stream-sniper-collector:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker images
      run: |
        # Test API image
        docker run --rm stream-sniper-api:test stream-sniper-api --help
        
        # Test Collector image
        docker run --rm stream-sniper-collector:test stream-sniper --help

  security-baseline:
    name: Security Baseline Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit semgrep

    - name: Run safety (dependency vulnerability check)
      run: safety check --json || true

    - name: Run bandit (security linter)
      run: bandit -r stream_sniper/ -f json || true

    - name: Run semgrep (security patterns)
      run: |
        python -m semgrep --config=auto stream_sniper/ --json || true