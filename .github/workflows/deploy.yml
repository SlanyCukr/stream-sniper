name: Deploy to Raspberry Pi

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to RPI5 8GB
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup local repository
        run: |
          # Copy checked-out code to deployment directory.
          # .env.prod is untracked and lives inside the deploy dir — preserve it
          # across the rm -rf or every deploy would wipe the production secrets.
          echo "🔄 Setting up deployment directory..."
          if [ -f /home/pi/stream-sniper/.env.prod ]; then
            cp /home/pi/stream-sniper/.env.prod /home/pi/.env.prod.stream-sniper.keep
          fi
          rm -rf /home/pi/stream-sniper
          mkdir -p /home/pi
          cp -r /home/pi/actions-runner/_work/stream-sniper/stream-sniper /home/pi/stream-sniper
          if [ -f /home/pi/.env.prod.stream-sniper.keep ]; then
            mv /home/pi/.env.prod.stream-sniper.keep /home/pi/stream-sniper/.env.prod
          fi
          echo "✅ Repository copied to /home/pi/stream-sniper"

      - name: Build Docker images
        run: |
          cd /home/pi/stream-sniper
          echo "📦 Building Docker images..."
          
          # Build frontend
          echo "🎨 Building frontend..."
          docker build -f frontend/Dockerfile.prod -t stream-sniper-frontend:latest ./frontend
          
          # Build backend API
          echo "🚀 Building backend API..."
          docker build -f backend/Dockerfile.api -t stream-sniper-api:latest ./backend
          
          echo "✅ All images built successfully"

      - name: Stop existing containers
        run: |
          cd /home/pi/stream-sniper
          docker compose -f docker-compose.prod.yml --env-file .env.prod down --remove-orphans || true
          docker container prune -f || true

      - name: Verify environment configuration
        run: |
          cd /home/pi/stream-sniper
          # Never fabricate .env.prod with weak/known defaults — deploying with a
          # guessable JWT signing secret or DB password is a security hole. Fail
          # loudly and require the operator to provision real production secrets.
          if [ ! -f .env.prod ]; then
            echo "❌ .env.prod is missing on the deploy host (/home/pi/stream-sniper/.env.prod)."
            echo "   Create it from the template with REAL production secrets before deploying:"
            echo "     cp .env.prod.template .env.prod  &&  \$EDITOR .env.prod"
            echo "   Required: SECRET_KEY (long random), POSTGRES_PASSWORD, TWITCH_CLIENT_ID, TWITCH_CLIENT_SECRET."
            exit 1
          fi
          echo "✅ .env.prod is present"

      - name: Deploy new containers
        run: |
          cd /home/pi/stream-sniper
          # Use production environment file
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

      - name: Wait for services to start
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 30

      - name: Verify deployment
        run: |
          cd /home/pi/stream-sniper
          echo "📊 Container status:"
          docker compose -f docker-compose.prod.yml --env-file .env.prod ps
          
          echo "🔍 Testing service endpoints..."
          
          # Test frontend accessibility
          if curl -f -s http://localhost:3001 > /dev/null; then
            echo "✅ Frontend accessible on port 3001"
          else
            echo "❌ Frontend not accessible"
            exit 1
          fi
          
          # Test API health endpoint through frontend proxy
          echo "🔍 Testing API health endpoint..."
          for i in {1..10}; do
            if curl -f -s http://localhost:3001/api/health > /dev/null; then
              echo "✅ API health check passed through frontend proxy"
              break
            else
              echo "⏳ Attempt $i/10: API not ready yet, waiting..."
              sleep 5
            fi
            if [ $i -eq 10 ]; then
              echo "❌ API health check failed after 10 attempts"
              echo "Debug: Container logs"
              docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=50
              exit 1
            fi
          done
          
          # Test database connectivity (shared 'postgres' container; the host
          # has no postgresql-client installed, so check from inside it)
          if docker exec postgres pg_isready -q; then
            echo "✅ Database is ready"
          else
            echo "❌ Database not ready"
            exit 1
          fi
          
          echo "🎉 Deployment successful!"

      - name: Show deployment info
        run: |
          echo "🌐 Stream Sniper is now deployed:"
          echo "   Frontend: https://stream-sniper.slanycukr.com"
          echo "   API:      https://stream-sniper.slanycukr.com/api"
          echo "   Status:   All services running on RPI5 8GB"

      - name: Clean up old Docker images
        run: |
          # Scope cleanup to dangling images only. This RPI is shared with other
          # projects — `docker system prune --volumes` would destroy their data.
          docker image prune -f