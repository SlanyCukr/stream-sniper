name: Deploy to Raspberry Pi

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to RPI5 8GB
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup local repository
        run: |
          # Copy checked-out code to deployment directory
          echo "🔄 Setting up deployment directory..."
          rm -rf /home/pi/stream-sniper
          mkdir -p /home/pi
          cp -r /home/pi/actions-runner/_work/stream-sniper/stream-sniper /home/pi/stream-sniper
          echo "✅ Repository copied to /home/pi/stream-sniper"

      - name: Build Docker images
        run: |
          cd /home/pi/stream-sniper
          echo "📦 Building Docker images..."
          
          # Build frontend
          echo "🎨 Building frontend..."
          docker build -f frontend/Dockerfile.prod -t stream-sniper-frontend:latest ./frontend
          
          # Build backend API
          echo "🚀 Building backend API..."
          docker build -f backend/Dockerfile.api -t stream-sniper-api:latest ./backend
          
          echo "✅ All images built successfully"

      - name: Stop existing containers
        run: |
          cd /home/pi/stream-sniper
          docker-compose -f docker-compose.prod.yml down || true

      - name: Setup environment configuration
        run: |
          cd /home/pi/stream-sniper
          # Create .env.prod from template if it doesn't exist
          if [ ! -f .env.prod ]; then
            echo "⚠️  .env.prod not found. Creating from template..."
            cp .env.prod.template .env.prod
            # Update with basic working values for automated deployment
            sed -i 's/your_secure_database_password_here/stream_sniper_password/g' .env.prod
            sed -i 's/your_very_long_secure_secret_key_for_jwt_signing_change_this_in_production/development_secret_key_change_in_production_123456789/g' .env.prod
            sed -i 's/your_twitch_client_id/your_twitch_client_id/g' .env.prod
            sed -i 's/your_twitch_client_secret/your_twitch_client_secret/g' .env.prod
            echo "✅ Created .env.prod with default values"
          fi

      - name: Deploy new containers
        run: |
          cd /home/pi/stream-sniper
          # Use production environment file
          docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d

      - name: Wait for services to start
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 30

      - name: Verify deployment
        run: |
          cd /home/pi/stream-sniper
          echo "📊 Container status:"
          docker-compose -f docker-compose.prod.yml ps
          
          echo "🔍 Testing service endpoints..."
          
          # Test frontend accessibility
          if curl -f -s http://localhost:3001 > /dev/null; then
            echo "✅ Frontend accessible on port 3001"
          else
            echo "❌ Frontend not accessible"
            exit 1
          fi
          
          # Test API health endpoint through frontend proxy
          echo "🔍 Testing API health endpoint..."
          for i in {1..10}; do
            if curl -f -s http://localhost:3001/api/health > /dev/null; then
              echo "✅ API health check passed through frontend proxy"
              break
            else
              echo "⏳ Attempt $i/10: API not ready yet, waiting..."
              sleep 5
            fi
            if [ $i -eq 10 ]; then
              echo "❌ API health check failed after 10 attempts"
              echo "Debug: Container logs"
              docker-compose -f docker-compose.prod.yml logs --tail=50
              exit 1
            fi
          done
          
          # Test database connectivity (host PostgreSQL)
          if pg_isready -h localhost -p 5432; then
            echo "✅ Host database is ready"
          else
            echo "❌ Host database not ready"
            exit 1
          fi
          
          echo "🎉 Deployment successful!"

      - name: Show deployment info
        run: |
          echo "🌐 Stream Sniper is now deployed:"
          echo "   Frontend: https://stream-sniper.slanycukr.com"
          echo "   API:      https://stream-sniper.slanycukr.com/api"
          echo "   Status:   All services running on RPI5 8GB"

      - name: Clean up old Docker images
        run: |
          docker image prune -f
          docker system prune -f --volumes