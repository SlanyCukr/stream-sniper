name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Export dependency list
      run: uv export --format requirements-txt --no-hashes --no-emit-project -o requirements.txt

    - name: Run Safety (PyUp.io)
      run: |
        uvx safety check -r requirements.txt --json --output safety-report.json || true
        uvx safety check -r requirements.txt --short-report || true

    - name: Run pip-audit
      run: |
        uvx pip-audit -r requirements.txt --format=json --output=pip-audit-report.json || true
        uvx pip-audit -r requirements.txt || true

    - name: Upload Safety report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: safety-report
        path: backend/safety-report.json
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload pip-audit report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: pip-audit-report
        path: backend/pip-audit-report.json
        retention-days: 30
        if-no-files-found: ignore

  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml] semgrep

    - name: Run Bandit
      working-directory: backend
      run: |
        bandit -r stream_sniper/ -f json -o bandit-report.json || true
        bandit -r stream_sniper/ || true

    - name: Run Semgrep
      working-directory: backend
      run: |
        python -m semgrep --config=auto stream_sniper/ --json --output=semgrep-report.json || true
        python -m semgrep --config=auto stream_sniper/ || true

    - name: Upload Bandit report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: bandit-report
        path: backend/bandit-report.json
        retention-days: 30

    - name: Upload Semgrep report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: semgrep-report
        path: backend/semgrep-report.json
        retention-days: 30

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    # base/head must differ per event: hardcoding base=main head=HEAD makes
    # them identical on pushes to main and TruffleHog hard-fails.
    - name: Run TruffleHog OSS (push — scan pushed commits)
      if: github.event_name == 'push'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.before }}
        head: ${{ github.sha }}
        extra_args: --only-verified

    - name: Run TruffleHog OSS (PR — scan branch diff)
      if: github.event_name == 'pull_request'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        extra_args: --only-verified

    - name: Run TruffleHog OSS (scheduled — full history scan)
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        extra_args: --only-verified

  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API image for scanning
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile.api
        load: true
        tags: stream-sniper-api:security-scan
        cache-from: type=gha

    - name: Build Collector image for scanning
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile.collector
        load: true
        tags: stream-sniper-collector:security-scan
        cache-from: type=gha

    - name: Run Trivy scan on API image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'stream-sniper-api:security-scan'
        format: 'sarif'
        output: 'trivy-api-results.sarif'

    - name: Run Trivy scan on Collector image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'stream-sniper-collector:security-scan'
        format: 'sarif'
        output: 'trivy-collector-results.sarif'

    - name: Upload Trivy scan results (API)
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-api-results.sarif'
        category: 'trivy-api'

    - name: Upload Trivy scan results (Collector)
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-collector-results.sarif'
        category: 'trivy-collector'

  security-report:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, code-security, codeql, secrets-scan]
    if: always()
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" > security-summary.md
        echo "" >> security-summary.md
        echo "## Scans Completed:" >> security-summary.md
        echo "- ✅ Dependency vulnerability scan" >> security-summary.md
        echo "- ✅ Code security analysis (Bandit + Semgrep)" >> security-summary.md
        echo "- ✅ CodeQL static analysis" >> security-summary.md
        echo "- ✅ Secret detection" >> security-summary.md
        
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "- ✅ Docker image security scan" >> security-summary.md
        else
          echo "- ⏭️ Docker image security scan (skipped for PRs)" >> security-summary.md
        fi
        
        echo "" >> security-summary.md
        echo "## Report Files:" >> security-summary.md
        
        if [ -f "safety-report/safety-report.json" ]; then
          echo "- 📄 Safety vulnerability report available" >> security-summary.md
        fi
        
        if [ -f "bandit-report/bandit-report.json" ]; then
          echo "- 📄 Bandit security analysis report available" >> security-summary.md
        fi
        
        if [ -f "semgrep-report/semgrep-report.json" ]; then
          echo "- 📄 Semgrep security patterns report available" >> security-summary.md
        fi
        
        echo "" >> security-summary.md
        echo "All security reports are available as artifacts for this workflow run." >> security-summary.md

    - name: Upload security summary
      uses: actions/upload-artifact@v7
      with:
        name: security-summary
        path: security-summary.md
        retention-days: 90