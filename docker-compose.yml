services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - stream-sniper

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    command: ["${TWITCH_USERNAME:-defaultuser}"]
    restart: "no"
    networks:
      - stream-sniper

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass $$REDIS_PASSWORD
        else
          redis-server
        fi
      "
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - stream-sniper
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: PostgreSQL container (comment out if using external database)
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./database/create_table.sql:/docker-entrypoint-initdb.d/01-schema.sql
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - stream-sniper

networks:
  stream-sniper:
    driver: bridge

volumes:
  redis_data:
