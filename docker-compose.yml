services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - API_PROXY_TARGET=http://api:5002
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - stream-sniper

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "5002:5002"
    volumes:
      # Dev hot reload: the image is built with `uv sync --no-editable`, i.e. the
      # project is installed as a real wheel inside the venv, not editable-linked
      # back to a source tree (that's what makes the prod image self-contained —
      # see Dockerfile.api). To get hot reload in dev without a second Dockerfile
      # target, we bind-mount the live source directly on top of the *installed*
      # package path inside the venv's site-packages, then run uvicorn --reload
      # watching that same path (command below).
      - ./backend/stream_sniper:/app/.venv/lib/python3.14/site-packages/stream_sniper
    command:
      [
        "uvicorn",
        "stream_sniper.api.api:app",
        "--host", "0.0.0.0",
        "--port", "5002",
        "--reload",
        "--reload-dir", "/app/.venv/lib/python3.14/site-packages/stream_sniper",
      ]
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - stream-sniper

  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile.collector
    volumes:
      # Same hot-reload approach as the api service (see comment above): bind
      # the live source over the installed package path in the venv.
      - ./backend/stream_sniper:/app/.venv/lib/python3.14/site-packages/stream_sniper
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: ["${TWITCH_USERNAME:-defaultuser}"]
    restart: "no"
    networks:
      - stream-sniper

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass $$REDIS_PASSWORD
        else
          redis-server
        fi
      "
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - stream-sniper
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: PostgreSQL container (comment out if using external database)
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - stream-sniper

networks:
  stream-sniper:
    driver: bridge

volumes:
  redis_data:
  # postgres_data: