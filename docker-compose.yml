services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - stream-sniper

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - stream-sniper

  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile.collector
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: ["${TWITCH_USERNAME:-defaultuser}"]
    restart: "no"
    networks:
      - stream-sniper

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass $$REDIS_PASSWORD
        else
          redis-server
        fi
      "
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - stream-sniper
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  stream-sniper:
    driver: bridge

volumes:
  redis_data: